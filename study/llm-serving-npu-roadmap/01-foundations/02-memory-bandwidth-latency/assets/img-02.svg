  <rect x="520" y="74" width="212" height="84" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="626" y="108" text-anchor="middle" class="label">Latency headroom</text>
  <text x="626" y="130" text-anchor="middle" class="sub">falls when bandwidth dominates</text>
  <text x="28" y="194" class="sub">Chapter interpretation: when model shrink barely helps but context length hurts, re-check bytes moved before more FLOPs tuning.</text>
