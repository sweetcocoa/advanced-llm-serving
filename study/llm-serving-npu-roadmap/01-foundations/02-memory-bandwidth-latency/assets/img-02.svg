<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220" role="img" aria-label="Decode bytes moved path">
  <rect width="760" height="220" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .sub { font-size: 14px; fill: #475569; }
  </style>
  <text x="28" y="36" class="title">Decode bytes moved path</text>
  <rect x="28" y="74" width="150" height="84" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="103" y="108" text-anchor="middle" class="label">New token</text>
  <text x="103" y="130" text-anchor="middle" class="sub">small fresh compute</text>
  <path d="M178 116 L238 116" stroke="#2563eb" stroke-width="4" fill="none"/>
