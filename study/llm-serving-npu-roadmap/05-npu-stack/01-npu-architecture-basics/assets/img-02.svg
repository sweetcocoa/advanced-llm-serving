  <text x="604" y="90" text-anchor="middle" font-size="12" font-family="Arial" fill="#6b1717">boundary</text>
  <path d="M504 123 L507 123" stroke="#7f2a2a" stroke-width="3" marker-end="url(#arrow2)"/>
  <path d="M525 123 L538 123" stroke="#7f2a2a" stroke-width="3" marker-end="url(#arrow2)"/>
  <path d="M592 123 L595 123" stroke="#7f2a2a" stroke-width="3" marker-end="url(#arrow2)"/>
  <path d="M613 123 L626 123" stroke="#7f2a2a" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="572" y="167" text-anchor="middle" font-size="15" font-family="Arial" fill="#6b1717">extra handoff and refill at each cut</text>
  <text x="380" y="225" text-anchor="middle" font-size="16" font-family="Arial" fill="#273248">Practical fusion in this chapter means fewer boundaries and longer residency.</text>
