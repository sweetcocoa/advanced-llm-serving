<svg width="760" height="250" viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fused path and partition boundary comparison">
  <rect width="760" height="250" fill="#f6f7fb"/>
  <text x="188" y="34" text-anchor="middle" font-size="22" font-family="Arial" fill="#1f355e">Fused / Long Residency</text>
  <text x="566" y="34" text-anchor="middle" font-size="22" font-family="Arial" fill="#5a1f1f">Unfused / Frequent Handoff</text>
  <rect x="40" y="66" width="296" height="122" rx="18" fill="#dff0de" stroke="#3f7b41" stroke-width="2"/>
  <rect x="78" y="104" width="62" height="38" rx="9" fill="#ffffff" stroke="#3f7b41"/>
  <rect x="156" y="104" width="62" height="38" rx="9" fill="#ffffff" stroke="#3f7b41"/>
  <rect x="234" y="104" width="62" height="38" rx="9" fill="#ffffff" stroke="#3f7b41"/>
  <text x="109" y="128" text-anchor="middle" font-size="16" font-family="Arial" fill="#204b22">Op 1</text>
  <text x="187" y="128" text-anchor="middle" font-size="16" font-family="Arial" fill="#204b22">Op 2</text>
  <text x="265" y="128" text-anchor="middle" font-size="16" font-family="Arial" fill="#204b22">Op 3</text>
  <path d="M140 123 L156 123" stroke="#2f5b31" stroke-width="3" marker-end="url(#arrow2)"/>
  <path d="M218 123 L234 123" stroke="#2f5b31" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="188" y="167" text-anchor="middle" font-size="15" font-family="Arial" fill="#204b22">single device segment, one write-back later</text>
  <rect x="424" y="66" width="296" height="122" rx="18" fill="#f4dede" stroke="#9a4040" stroke-width="2"/>
  <rect x="450" y="104" width="54" height="38" rx="9" fill="#ffffff" stroke="#9a4040"/>
  <rect x="538" y="104" width="54" height="38" rx="9" fill="#ffffff" stroke="#9a4040"/>
  <rect x="626" y="104" width="54" height="38" rx="9" fill="#ffffff" stroke="#9a4040"/>
  <text x="477" y="128" text-anchor="middle" font-size="16" font-family="Arial" fill="#6b1717">Op 1</text>
  <text x="565" y="128" text-anchor="middle" font-size="16" font-family="Arial" fill="#6b1717">Op 2</text>
  <text x="653" y="128" text-anchor="middle" font-size="16" font-family="Arial" fill="#6b1717">Op 3</text>
  <rect x="507" y="98" width="18" height="50" rx="4" fill="#f7c6c6" stroke="#9a4040"/>
  <rect x="595" y="98" width="18" height="50" rx="4" fill="#f7c6c6" stroke="#9a4040"/>
