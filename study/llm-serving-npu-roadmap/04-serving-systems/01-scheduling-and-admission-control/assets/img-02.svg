<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f7f1ea"/>
  <rect x="60" y="48" width="1080" height="624" rx="28" fill="#fffdfa" stroke="#202020" stroke-width="4"/>
  <text x="90" y="108" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#202020">Retry Burst Amplification</text>
  <text x="90" y="146" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#444">Identical retry timing can turn admission control into a periodic queue spike generator.</text>
  <line x1="150" y1="220" x2="1050" y2="220" stroke="#202020" stroke-width="4"/>
  <line x1="150" y1="360" x2="1050" y2="360" stroke="#202020" stroke-width="4"/>
  <line x1="150" y1="520" x2="1050" y2="520" stroke="#202020" stroke-width="4"/>
  <text x="90" y="226" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#202020">Clients</text>
  <text x="90" y="366" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#202020">Admission</text>
  <text x="90" y="526" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#202020">Queue</text>
  <line x1="240" y1="188" x2="240" y2="550" stroke="#8b8b8b" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="540" y1="188" x2="540" y2="550" stroke="#8b8b8b" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="860" y1="188" x2="860" y2="550" stroke="#8b8b8b" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="224" y="176" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#202020">t0</text>
  <text x="500" y="176" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#202020">t0 + 2s</text>
  <text x="822" y="176" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#202020">t0 + jitter</text>
  <rect x="188" y="194" width="108" height="52" rx="12" fill="#c9493c"/>
  <text x="211" y="226" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#fff">burst</text>
  <path d="M 296 220 L 470 220" fill="none" stroke="#c9493c" stroke-width="6" marker-end="url(#arrow-red)"/>
  <text x="330" y="205" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#7d221a">same clients retry together</text>
  <rect x="444" y="334" width="190" height="52" rx="12" fill="#d99849"/>
  <text x="466" y="366" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">Retry-After: 2s</text>
  <rect x="500" y="494" width="196" height="52" rx="12" fill="#c9493c"/>
  <text x="528" y="526" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">queue spike repeats</text>
  <rect x="818" y="194" width="124" height="52" rx="12" fill="#3f7d4f"/>
  <text x="846" y="226" font-family="Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#fff">spread</text>
  <path d="M 650 360 C 738 320, 770 320, 858 360" fill="none" stroke="#3f7d4f" stroke-width="6" marker-end="url(#arrow-green)"/>
  <text x="684" y="309" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#255132">jittered retry / background lane</text>
  <rect x="792" y="494" width="210" height="52" rx="12" fill="#3f7d4f"/>
  <text x="816" y="526" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#fff">lower oscillation</text>
  <rect x="154" y="588" width="920" height="48" rx="14" fill="#ebe3d7" stroke="#8b6a42" stroke-width="2"/>
  <text x="182" y="619" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4d3b25">Admission policy is incomplete if it chooses reject timing but ignores how clients re-enter the system.</text>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c9493c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f7d4f"/>
    </marker>
  </defs>
</svg>
