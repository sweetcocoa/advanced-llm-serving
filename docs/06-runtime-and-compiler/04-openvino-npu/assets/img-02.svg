<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="OpenVINO NPU target and cache flow">
  <rect width="960" height="420" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 14px; fill: #334155; }
    .pill { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 12; }
    .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 12; }
    .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 12; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="28" y="42" class="title">OpenVINO NPU target and cache flow</text>
  <text x="28" y="68" class="subtitle">Chapter-authored synthesis from [S1]: device target choice, static-shape gate, support checks, and cache-driven first-run split.</text>

  <rect x="28" y="96" width="250" height="108" class="box"/>
  <text x="52" y="128" class="label">1. Access mode</text>
  <rect x="52" y="144" width="66" height="28" class="pill"/>
  <text x="85" y="163" text-anchor="middle" class="small">"NPU"</text>
  <rect x="126" y="144" width="72" height="28" class="pill"/>
  <text x="162" y="163" text-anchor="middle" class="small">AUTO</text>
  <rect x="206" y="144" width="96" height="28" class="pill"/>
  <text x="254" y="163" text-anchor="middle" class="small">HETERO</text>
  <text x="52" y="190" class="small">Direct target, policy choice, and split execution are different experiments.</text>

  <rect x="328" y="96" width="270" height="108" class="box"/>
  <text x="352" y="128" class="label">2. NPU gate</text>
  <rect x="352" y="144" width="222" height="28" class="warn"/>
  <text x="463" y="163" text-anchor="middle" class="small">Static shape first</text>
  <text x="352" y="190" class="small">Then check supported data types and feature support.</text>

  <rect x="648" y="96" width="284" height="108" class="box"/>
  <text x="672" y="128" class="label">3. Compile outcome</text>
  <rect x="672" y="144" width="102" height="28" class="good"/>
  <text x="723" y="163" text-anchor="middle" class="small">Cache hit</text>
  <rect x="784" y="144" width="116" height="28" class="warn"/>
  <text x="842" y="163" text-anchor="middle" class="small">Cache miss</text>
  <text x="672" y="190" class="small">First-run cost depends on compile/load before inference.</text>

  <rect x="84" y="260" width="348" height="118" class="box"/>
  <text x="108" y="292" class="label">First-run path</text>
  <text x="108" y="320" class="small">compile_model(..., "NPU")</text>
  <text x="108" y="344" class="small">= compile + load + infer</text>
  <text x="108" y="368" class="small">Use when validating actual NPU path formation.</text>

  <rect x="528" y="260" width="348" height="118" class="box"/>
  <text x="552" y="292" class="label">Steady-state path</text>
  <text x="552" y="320" class="small">cached compiled artifact reused</text>
  <text x="552" y="344" class="small">average latency drops as compile cost is amortized</text>
  <text x="552" y="368" class="small">Do not mix this with first-run numbers.</text>

  <path d="M278 150 L328 150" class="arrow"/>
  <path d="M598 150 L648 150" class="arrow"/>
  <path d="M790 204 L790 246 L702 246 L702 260" class="arrow"/>
  <path d="M724 204 L724 246 L258 246 L258 260" class="arrow"/>
</svg>
