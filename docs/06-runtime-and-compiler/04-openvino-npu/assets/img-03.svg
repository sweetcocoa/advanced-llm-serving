<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="Intel NPU access-path chooser">
  <rect width="960" height="420" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #475569; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 14px; fill: #334155; }
    .pill { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; rx: 12; }
    .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 12; }
    .warn { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 12; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="28" y="42" class="title">Intel NPU access-path chooser</text>
  <text x="28" y="68" class="subtitle">Chapter-authored synthesis from [S1], [S2], and [S4]: choose the path by product question, not by brand label alone.</text>

  <rect x="28" y="106" width="250" height="238" class="box"/>
  <text x="52" y="138" class="label">OpenVINO NPU</text>
  <rect x="52" y="154" width="156" height="28" class="good"/>
  <text x="130" y="173" text-anchor="middle" class="small">Same runtime, direct target</text>
  <text x="52" y="208" class="small">Use first when you want:</text>
  <text x="52" y="232" class="small">- "NPU" vs AUTO vs HETERO in one toolkit</text>
  <text x="52" y="256" class="small">- Static-shape/support gate visibility</text>
  <text x="52" y="280" class="small">- Cache / first-run vs steady-state checks</text>
  <text x="52" y="316" class="small">Primary source lane: [S1]</text>

  <rect x="354" y="106" width="250" height="238" class="box"/>
  <text x="378" y="138" class="label">Intel NPU Acceleration Library</text>
  <rect x="378" y="154" width="166" height="28" class="pill"/>
  <text x="461" y="173" text-anchor="middle" class="small">Direct Intel NPU library path</text>
  <text x="378" y="208" class="small">Use first when you want:</text>
  <text x="378" y="232" class="small">- Intel NPU-specific library workflow</text>
  <text x="378" y="256" class="small">- Less emphasis on OpenVINO device policy</text>
  <text x="378" y="280" class="small">- Separate control surface from OpenVINO</text>
  <text x="378" y="316" class="small">Primary source lane: [S2]</text>

  <rect x="680" y="106" width="250" height="238" class="box"/>
  <text x="704" y="138" class="label">Windows ML</text>
  <rect x="704" y="154" width="162" height="28" class="warn"/>
  <text x="785" y="173" text-anchor="middle" class="small">OS integration comes first</text>
  <text x="704" y="208" class="small">Use first when you want:</text>
  <text x="704" y="232" class="small">- Windows app integration and deployment</text>
  <text x="704" y="256" class="small">- OS-managed on-device AI experience</text>
  <text x="704" y="280" class="small">- Less direct OpenVINO-style target control</text>
  <text x="704" y="316" class="small">Primary source lane: [S4]</text>

  <path d="M278 225 H338" class="arrow"/>
  <path d="M604 225 H664" class="arrow"/>
  <text x="480" y="386" text-anchor="middle" class="small">Decision rule: start from the product question, then choose the control surface that answers it.</text>
</svg>
