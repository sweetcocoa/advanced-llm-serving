<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-label="Cross-node expert placement map">
  <rect width="920" height="320" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .sub { font-size: 14px; fill: #475569; }
  </style>
  <text x="24" y="34" class="title">Cross-node expert placement map</text>
  <rect x="36" y="72" width="260" height="170" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="166" y="104" text-anchor="middle" class="label">Node A</text>
  <rect x="72" y="132" width="64" height="42" rx="10" fill="#ffffff" stroke="#2563eb"/>
  <rect x="150" y="132" width="64" height="42" rx="10" fill="#ffffff" stroke="#2563eb"/>
  <rect x="228" y="132" width="64" height="42" rx="10" fill="#ffffff" stroke="#2563eb"/>
  <text x="104" y="158" text-anchor="middle" class="sub">E1</text>
  <text x="182" y="158" text-anchor="middle" class="sub">E2</text>
  <text x="260" y="158" text-anchor="middle" class="sub">E3</text>
  <rect x="624" y="72" width="260" height="170" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="754" y="104" text-anchor="middle" class="label">Node B</text>
  <rect x="660" y="132" width="64" height="42" rx="10" fill="#ffffff" stroke="#dc2626"/>
  <rect x="738" y="132" width="64" height="42" rx="10" fill="#ffffff" stroke="#dc2626"/>
  <rect x="816" y="132" width="64" height="42" rx="10" fill="#ffffff" stroke="#dc2626"/>
  <text x="692" y="158" text-anchor="middle" class="sub">E4</text>
  <text x="770" y="158" text-anchor="middle" class="sub">E5</text>
  <text x="848" y="158" text-anchor="middle" class="sub">E6</text>
  <rect x="346" y="118" width="228" height="78" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="460" y="148" text-anchor="middle" class="label">Router picks hot pair</text>
  <text x="460" y="172" text-anchor="middle" class="sub">tokens frequently need E2 + E5</text>
  <path d="M214 154 L346 154" stroke="#2563eb" stroke-width="4" fill="none"/>
  <polygon points="346,154 332,146 332,162" fill="#2563eb"/>
  <path d="M574 154 L660 154" stroke="#dc2626" stroke-width="4" fill="none"/>
  <polygon points="660,154 646,146 646,162" fill="#dc2626"/>
  <path d="M214 214 C320 278, 610 278, 738 174" stroke="#f59e0b" stroke-width="4" fill="none"/>
  <text x="470" y="268" text-anchor="middle" class="label">Cross-node dispatch repeated every step</text>
  <text x="470" y="290" text-anchor="middle" class="sub">placement makes fabric tail dominate even when average compute looks fine</text>
</svg>
