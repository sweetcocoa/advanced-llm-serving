<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-label="Hot expert skew and capacity overflow">
  <rect width="920" height="300" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 24px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 700; }
    .sub { font-size: 14px; fill: #475569; }
  </style>
  <text x="24" y="34" class="title">Hot expert skew and capacity overflow</text>
  <rect x="30" y="78" width="180" height="160" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="112" text-anchor="middle" class="label">Router output</text>
  <text x="120" y="138" text-anchor="middle" class="sub">Expert 3: 14 tokens</text>
  <text x="120" y="160" text-anchor="middle" class="sub">Expert 7: 5 tokens</text>
  <text x="120" y="182" text-anchor="middle" class="sub">Expert 11: 18 tokens</text>
  <text x="120" y="204" text-anchor="middle" class="sub">Expert 19: 3 tokens</text>
  <path d="M210 158 L296 158" stroke="#2563eb" stroke-width="4" fill="none"/>
  <polygon points="296,158 282,150 282,166" fill="#2563eb"/>
  <rect x="296" y="78" width="196" height="160" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="394" y="112" text-anchor="middle" class="label">Capacity check</text>
  <text x="394" y="138" text-anchor="middle" class="sub">Ce = ceil(alpha * B * k / E)</text>
  <text x="394" y="164" text-anchor="middle" class="sub">balanced experts pass</text>
  <text x="394" y="186" text-anchor="middle" class="sub">hot expert hits overflow first</text>
  <path d="M492 140 L596 140" stroke="#16a34a" stroke-width="4" fill="none"/>
  <polygon points="596,140 582,132 582,148" fill="#16a34a"/>
  <rect x="596" y="70" width="136" height="72" rx="14" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
  <text x="664" y="102" text-anchor="middle" class="label">Run expert FFN</text>
  <text x="664" y="122" text-anchor="middle" class="sub">n_e &lt;= C_e</text>
  <path d="M492 188 L596 188" stroke="#f59e0b" stroke-width="4" fill="none"/>
  <polygon points="596,188 582,180 582,196" fill="#f59e0b"/>
  <rect x="596" y="158" width="250" height="88" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="721" y="190" text-anchor="middle" class="label">Overflow / reroute / delay</text>
  <text x="721" y="212" text-anchor="middle" class="sub">tail latency grows at the busiest expert</text>
  <text x="721" y="232" text-anchor="middle" class="sub">memory savings can turn into p99 pain</text>
  <text x="30" y="274" class="sub">Classroom synthesis from GShard and Switch Transformer: capacity is not just a memory knob, it determines where skew turns into tail latency.</text>
</svg>
