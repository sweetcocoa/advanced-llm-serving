<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">QDQ artifact inspection class excerpt</title>
  <desc id="desc">A chapter-specific local visual showing a class-style excerpt for exporting a static QDQ artifact, inspecting QDQ nodes and quantization constants, and branching to QNN EP or OpenVINO NPU import checks.</desc>
  <rect width="1200" height="760" fill="#f4efe7"/>

  <rect x="34" y="28" width="1132" height="86" rx="18" fill="#153a35"/>
  <text x="68" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">QDQ artifact inspection class excerpt</text>
  <text x="68" y="101" font-family="Arial, sans-serif" font-size="19" fill="#d7ebe4">Chapter-local teaching visual based on S1-S4 terminology: calibration to artifact to import</text>

  <rect x="40" y="142" width="660" height="560" rx="20" fill="#fffdf9" stroke="#dacfc0" stroke-width="2"/>
  <rect x="64" y="170" width="612" height="52" rx="12" fill="#d7ebe4"/>
  <text x="86" y="203" font-family="Courier New, monospace" font-size="25" font-weight="700" fill="#153a35">class QuantizedArtifactInspector</text>

  <text x="84" y="250" font-family="Courier New, monospace" font-size="22" fill="#223332">fp32_model = "model.onnx"</text>
  <text x="84" y="282" font-family="Courier New, monospace" font-size="22" fill="#223332">calibration_dataset = "representative inputs"</text>
  <text x="84" y="314" font-family="Courier New, monospace" font-size="22" fill="#223332">target_artifact = "model.qdq.onnx"</text>

  <rect x="76" y="340" width="588" height="92" rx="14" fill="#edf7f4" stroke="#b8d8d0" stroke-width="2"/>
  <text x="98" y="374" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#153a35">def export_static_qdq():</text>
  <text x="118" y="405" font-family="Courier New, monospace" font-size="20" fill="#223332">pre-process -> calibrate -> write QDQ graph</text>

  <rect x="76" y="452" width="588" height="142" rx="14" fill="#fff6db" stroke="#d6aa25" stroke-width="2"/>
  <text x="98" y="486" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#74540b">def inspect_graph():</text>
  <text x="118" y="518" font-family="Courier New, monospace" font-size="20" fill="#3a2d09">1. QuantizeLinear / DeQuantizeLinear nodes exist</text>
  <text x="118" y="548" font-family="Courier New, monospace" font-size="20" fill="#3a2d09">2. scale / zero_point constants are fixed</text>
  <text x="118" y="578" font-family="Courier New, monospace" font-size="20" fill="#3a2d09">3. artifact shape matches import constraints</text>

  <rect x="76" y="614" width="588" height="66" rx="14" fill="#eaf1ff" stroke="#3f7fd2" stroke-width="2"/>
  <text x="98" y="654" font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#1f4f8d">def import_targets(): QNN EP | OpenVINO NPU</text>

  <rect x="730" y="142" width="430" height="268" rx="20" fill="#fffdf9" stroke="#dacfc0" stroke-width="2"/>
  <text x="758" y="182" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#153a35">QDQ graph cue</text>

  <rect x="760" y="214" width="92" height="56" rx="12" fill="#d7ebe4" stroke="#7eb6a8" stroke-width="2"/>
  <text x="778" y="249" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#153a35">Q</text>

  <rect x="900" y="214" width="92" height="56" rx="12" fill="#fff4d8" stroke="#d6aa25" stroke-width="2"/>
  <text x="923" y="249" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#7a5909">MatMul</text>

  <rect x="1038" y="214" width="92" height="56" rx="12" fill="#dce9ff" stroke="#3f7fd2" stroke-width="2"/>
  <text x="1056" y="249" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f4f8d">DQ</text>

  <line x1="852" y1="242" x2="900" y2="242" stroke="#5e746e" stroke-width="4"/>
  <line x1="992" y1="242" x2="1038" y2="242" stroke="#5e746e" stroke-width="4"/>

  <rect x="760" y="300" width="370" height="80" rx="12" fill="#f4f8f7"/>
  <text x="782" y="333" font-family="Arial, sans-serif" font-size="19" fill="#223332">scale: initializer constant</text>
  <text x="782" y="360" font-family="Arial, sans-serif" font-size="19" fill="#223332">zero_point: initializer constant</text>

  <rect x="730" y="434" width="430" height="268" rx="20" fill="#fffdf9" stroke="#dacfc0" stroke-width="2"/>
  <text x="758" y="474" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#153a35">Import branch checks</text>

  <rect x="760" y="506" width="166" height="152" rx="14" fill="#fff6db" stroke="#d6aa25" stroke-width="2"/>
  <text x="782" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#74540b">QNN EP</text>
  <text x="782" y="574" font-family="Arial, sans-serif" font-size="18" fill="#3a2d09">quantized model</text>
  <text x="782" y="602" font-family="Arial, sans-serif" font-size="18" fill="#3a2d09">fixed shapes</text>
  <text x="782" y="630" font-family="Arial, sans-serif" font-size="18" fill="#3a2d09">fallback off for</text>
  <text x="782" y="654" font-family="Arial, sans-serif" font-size="18" fill="#3a2d09">support check</text>

  <rect x="958" y="506" width="172" height="152" rx="14" fill="#eaf1ff" stroke="#3f7fd2" stroke-width="2"/>
  <text x="980" y="540" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f4f8d">OpenVINO NPU</text>
  <text x="980" y="574" font-family="Arial, sans-serif" font-size="18" fill="#183c70">ONNX Q/DQ import</text>
  <text x="980" y="602" font-family="Arial, sans-serif" font-size="18" fill="#183c70">IR handoff</text>
  <text x="980" y="630" font-family="Arial, sans-serif" font-size="18" fill="#183c70">compile_model</text>
  <text x="980" y="654" font-family="Arial, sans-serif" font-size="18" fill="#183c70">to NPU</text>

  <rect x="40" y="718" width="1120" height="18" rx="9" fill="#153a35"/>
</svg>
